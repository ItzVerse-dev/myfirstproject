name: Deploy Website to GitHub Pages

# Rule: Run this pipeline automatically every time code is pushed to the 'main' branch
on:
  push:
    branches: ["main"]

# Grant permissions required to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Website Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads everything in the root folder

      - name: Deploy Live to the Web
        id: deployment
        uses: actions/deploy-pages@v4
